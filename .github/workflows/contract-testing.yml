# ─────────────────────────────────────────────────────────────────────────────
# Contract Testing CI Pipeline
#
# Runs on every push and PR to main. Executes:
#   1. Schema validation & unit-level API tests
#   2. Consumer contract generation (Pact)
#   3. Provider contract verification
#   4. End-to-end integration tests
# ─────────────────────────────────────────────────────────────────────────────

name: Contract Testing Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  PROVIDER_API_KEY: "contract-testing-key-2024"

jobs:
  # ── Lint & Static Analysis ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run ruff linter
        run: ruff check .

      - name: Run mypy type checks
        run: mypy services/ lib/ --ignore-missing-imports

  # ── Schema & API Tests ────────────────────────────────────────────────────
  api-tests:
    name: Schema & API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run schema validation tests
        run: pytest tests/schema/ -v --junitxml=reports/schema-results.xml

      - name: Run negative & auth tests
        run: pytest tests/api/ -v --junitxml=reports/api-results.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: reports/

  # ── Consumer Contract Tests ────────────────────────────────────────────────
  consumer-contracts:
    name: Generate Consumer Contracts
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run consumer contract tests
        run: pytest tests/contract/test_consumer_contract.py -v --junitxml=reports/consumer-contract-results.xml

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-contract-reports
          path: reports/

  # ── Provider Verification ──────────────────────────────────────────────────
  provider-verification:
    name: Verify Provider Against Contracts
    runs-on: ubuntu-latest
    needs: consumer-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download Pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Run provider verification
        run: pytest tests/contract/test_provider_verification.py -v --junitxml=reports/provider-verification-results.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-verification-reports
          path: reports/

  # ── Integration Tests ──────────────────────────────────────────────────────
  integration-tests:
    name: End-to-End Integration Tests
    runs-on: ubuntu-latest
    needs: [api-tests, provider-verification]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run e2e tests
        run: pytest tests/integration/test_e2e.py -v --junitxml=reports/e2e-results.xml

      - name: Run OrangeHRM integration tests
        run: pytest tests/integration/test_orangehrm.py -v --run-integration --junitxml=reports/orangehrm-results.xml
        continue-on-error: true  # External service may be unavailable

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/

  # ── Docker Build Smoke Test ────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Compose Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for provider health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo " Provider ready"
              break
            fi
            sleep 2
          done

      - name: Smoke test provider
        run: |
          curl -sf -H "X-API-Key: contract-testing-key-2024" \
            http://localhost:8000/api/v1/employees | python -m json.tool

      - name: Smoke test consumer
        run: |
          curl -sf http://localhost:8001/health | python -m json.tool

      - name: Tear down
        if: always()
        run: docker compose down -v
